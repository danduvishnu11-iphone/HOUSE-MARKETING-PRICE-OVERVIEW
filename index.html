    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class FireworkParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 3 + 1;
                this.friction = 0.95;
                this.gravity = 0.07;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class FireworkBurst {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * (canvas.height * 0.6) + 30;
                const colors = ['#ff2a6d', '#05d9e8', '#01012b', '#f5a623', '#b8e986', '#f8e71c', '#e2e8f0'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.particles = [];
                for(let i=0; i<45; i++) {
                    this.particles.push(new FireworkParticle(this.x, this.y, this.color));
                }
            }
            update() {
                this.particles.forEach((p, idx) => {
                    p.update();
                    if(p.alpha <= 0) this.particles.splice(idx, 1);
                });
            }
            draw() {
                this.particles.forEach(p => p.draw());
            }
        }

        let bursts = [];
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(Math.random() < 0.04 && bursts.length < 5) {
                bursts.push(new FireworkBurst());
            }
            bursts.forEach((b, idx) => {
                b.update();
                b.draw();
                if(b.particles.length === 0) bursts.splice(idx, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
